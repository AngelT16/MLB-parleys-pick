kind = "web"
previewPath = "/"
title = "Plain Page"
version = "1.0.0"
id = "artifacts/plain-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26195

[services.development]
run = "pnpm --filter @workspace/plain-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plain-page", "run", "build" ]
publicDir = "artifacts/plain-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26195"
BASE_PATH = "/"
